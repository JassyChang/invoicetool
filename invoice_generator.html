<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quanta Invoice Generator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f5f5f5; color: #333; }
        .container { display: grid; grid-template-columns: 320px 1fr; gap: 0; min-height: 100vh; }
        .panel { background: white; border-right: 1px solid #e5e5e5; padding: 20px; overflow-y: auto; max-height: 100vh; }
        .panel h1 { font-size: 16px; margin-bottom: 20px; }
        .section { margin-bottom: 20px; }
        .section-label { font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: block; }
        input, textarea, select { width: 100%; font-family: inherit; font-size: 13px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 8px; }
        input:focus, textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }
        textarea { resize: vertical; min-height: 70px; }
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; background: white; color: #333; cursor: pointer; font-size: 12px; font-weight: 500; }
        .btn:hover { background: #f9f9f9; border-color: #999; }
        .btn-primary { border-color: #3b82f6; color: #3b82f6; }
        .btn-primary:hover { background: #eff6ff; }
        .btn-print { border-color: #16a34a; color: #16a34a; width: 100%; justify-content: center; }
        .btn-print:hover { background: #f0fdf4; }
        .btn-small { padding: 6px 10px; font-size: 11px; }
        .item-card { background: #fafafa; border: 1px solid #eee; border-radius: 4px; padding: 12px; margin-bottom: 10px; position: relative; }
        .item-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .field-label { font-size: 11px; color: #666; font-weight: 500; margin-bottom: 4px; display: block; }
        .remove-btn { position: absolute; top: 8px; right: 8px; background: none; border: none; cursor: pointer; color: #999; font-size: 16px; padding: 4px; opacity: 0; transition: opacity 0.15s; }
        .item-card:hover .remove-btn { opacity: 1; }
        .signer-section { background: #f0f7ff; border-left: 3px solid #3b82f6; padding: 12px; border-radius: 4px; margin-top: 12px; }
        .preview-area { background: #f0f0f0; padding: 30px; overflow-y: auto; display: flex; justify-content: center; align-items: flex-start; }
        .invoice { background: white; width: 100%; max-width: 680px; padding: 32px 40px; font-family: 'Calibri', Arial, sans-serif; font-size: 9px; color: #000; line-height: 1.4; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .inv-title { text-align: center; font-size: 14px; font-weight: bold; border-top: 1.5px solid #000; border-bottom: 1.5px solid #000; padding: 8px 0; margin: 10px 0 15px; }
        .inv-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
        .inv-table th { padding: 7px 5px; text-align: center; font-size: 8.5px; font-weight: bold; border-top: 1.5px solid #000; border-bottom: 1.5px solid #000; }
        .inv-table td { padding: 5px 5px; font-size: 8.5px; border-bottom: 0.5px solid #ddd; }
        .inv-table .total-row td { border-top: 1.5px solid #000; font-weight: bold; padding: 8px 5px; }
        .inv-addr-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
        .inv-addr-table td { border: 1px solid #000; padding: 10px; vertical-align: top; font-size: 8.5px; line-height: 1.6; width: 50%; }
        .say-total { font-weight: bold; font-size: 8.5px; padding: 8px 0; border-bottom: 0.5px solid #ccc; margin-bottom: 12px; }
        .banking { margin-bottom: 20px; }
        .banking-title { font-weight: bold; font-size: 8.5px; margin-bottom: 4px; }
        .banking-line { font-size: 8px; padding-left: 16px; line-height: 1.6; }
        .sig-block { text-align: right; margin-top: 20px; }
        .sig-inner { display: inline-block; border-top: 1px solid #000; padding-top: 6px; min-width: 160px; text-align: center; }
        .sig-company { font-weight: bold; font-size: 8.5px; }
        .sig-name { font-size: 11px; font-style: italic; font-family: Georgia, serif; margin-top: 4px; }
        .parse-error { color: #dc2626; font-size: 11px; margin-top: 6px; }
        .api-key-hint { font-size: 10px; color: #666; margin-top: 4px; line-height: 1.4; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        @media (max-width: 1000px) {
            .container { grid-template-columns: 1fr; }
            .panel { max-height: auto; border-right: none; border-bottom: 1px solid #e5e5e5; }
            .preview-area { min-height: 600px; }
        }
        @media print {
            .panel, .btn-print { display: none !important; }
            .container { grid-template-columns: 1fr; }
            .invoice { box-shadow: none; padding: 0; max-width: 100%; }
            body { background: white; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <div class="header-row">
            <h1>Invoice Generator</h1>
            <button class="btn btn-print" onclick="window.print()">🖨️ Print PDF</button>
        </div>

        <div class="section">
            <label class="section-label">Invoice Details</label>
            <input type="text" id="inv-no" value="5S800-2026062304" placeholder="Invoice No" oninput="render()">
            <input type="text" id="po-no" value="" placeholder="PO No (e.g. 1104602)" oninput="render()">
            <input type="text" id="issue-date" oninput="render()">
        </div>

        <div class="section">
            <label class="section-label">Ship To Address</label>
            <textarea id="ship-to" oninput="render()">Tighe Warehouse Field Service
481 Wildwood Ave
Woburn, MA 01801</textarea>
        </div>

        <div class="section">
            <label class="section-label">AI Parse PO (Optional)</label>
            <textarea id="po-paste" placeholder="Paste full PO text here, then click Parse →"></textarea>
            <div id="parse-error" class="parse-error" style="display:none"></div>
            <button class="btn btn-primary" style="width:100%; justify-content:center; margin-top:8px" onclick="parsePO()">✨ Parse PO</button>
            <div class="api-key-hint">ℹ️ To use AI parsing, set your Anthropic API key in the console or remove this PO section and add items manually.</div>
        </div>

        <div class="section">
            <div class="header-row">
                <label class="section-label" style="margin-bottom:0">Line Items</label>
                <button class="btn btn-primary btn-small" onclick="addItem()">+ Add</button>
            </div>
            <div id="items-list"></div>
        </div>

        <div class="signer-section">
            <label class="field-label" style="margin-bottom:6px">Signed By</label>
            <input type="text" id="signer" value="Jassy Chang" oninput="render()" style="margin-bottom:6px">
            <small style="color:#666">↓ This name appears on the invoice header and signature block</small>
        </div>
    </div>

    <div class="preview-area">
        <div id="invoice-preview" class="invoice"></div>
    </div>
</div>

<script>
const BANKING = [
    '1. BENEFICIARY A/C: QUANTA COMPUTER INC.',
    '2. A/C NO: 123-51-000006-1',
    '3. BENEFICIARY BANK: HUA NAN COMMERCIAL BANK LTD. SHIH LIN BRANCH.',
    '4. SWIFT ID: HNBKTWTP123',
    '5. BANK ADDRESS: 246, SEC. 4, CHENG THE ROAD, TAIPEI 11170, TAIWAN, R.O.C',
    '6. BANK TEL: 2881-9500 *253 *252'
];

const ONES = ['', 'ONE', 'TWO', 'THREE', 'FOUR', 'FIVE', 'SIX', 'SEVEN', 'EIGHT', 'NINE', 'TEN', 'ELEVEN', 'TWELVE', 'THIRTEEN', 'FOURTEEN', 'FIFTEEN', 'SIXTEEN', 'SEVENTEEN', 'EIGHTEEN', 'NINETEEN'];
const TENS = ['', '', 'TWENTY', 'THIRTY', 'FORTY', 'FIFTY', 'SIXTY', 'SEVENTY', 'EIGHTY', 'NINETY'];

function numW(n) {
    n = Math.floor(n);
    if (!n) return '';
    if (n < 20) return ONES[n];
    if (n < 100) return TENS[Math.floor(n / 10)] + (n % 10 ? ' ' + ONES[n % 10] : '');
    const r = numW(n % 100);
    return ONES[Math.floor(n / 100)] + ' HUNDRED' + (r ? ' ' + r : '');
}

function amtWords(a) {
    const r = Math.round(a * 100) / 100;
    const d = Math.floor(r);
    const c = Math.round((r - d) * 100);
    const p = [];
    let x = d;
    if (x >= 1000000) { p.push(numW(Math.floor(x / 1000000)) + ' MILLION'); x %= 1000000; }
    if (x >= 1000) { p.push(numW(Math.floor(x / 1000)) + ' THOUSAND'); x %= 1000; }
    if (x > 0) p.push(numW(x));
    return 'SAY TOTAL USD ' + (p.join(' ') || 'ZERO') + ' POINT ' + numW(c);
}

function fmt(n) {
    return (+n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function esc(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

let items = [];
let nextId = 1;

function newItem() { return { id: nextId++, category: '', description: '', unitPrice: '', qty: 1 }; }
function addItem() { items.push(newItem()); renderItemsList(); render(); }
function removeItem(id) { items = items.filter(i => i.id !== id); renderItemsList(); render(); }
function updateItem(id, field, val) { const it = items.find(i => i.id === id); if (it) { it[field] = val; render(); } }

function renderItemsList() {
    const el = document.getElementById('items-list');
    el.innerHTML = items.map((it, idx) => `
        <div class="item-card">
            <small style="color:#999">Item ${idx + 1}</small>
            <div class="item-grid">
                <div><label class="field-label">Category</label><input value="${esc(it.category)}" oninput="updateItem(${it.id},'category',this.value)"></div>
                <div><label class="field-label">Description</label><input value="${esc(it.description)}" oninput="updateItem(${it.id},'description',this.value)"></div>
                <div><label class="field-label">Unit Price (USD)</label><input type="number" step="0.01" value="${esc(it.unitPrice)}" oninput="updateItem(${it.id},'unitPrice',this.value)"></div>
                <div><label class="field-label">Qty</label><input type="number" step="1" value="${esc(it.qty)}" oninput="updateItem(${it.id},'qty',this.value)"></div>
            </div>
            ${items.length > 1 ? `<button class="remove-btn" onclick="removeItem(${it.id})" title="Remove">✕</button>` : ''}
        </div>
    `).join('');
}

function render() {
    const invNo = document.getElementById('inv-no').value;
    const poNo = document.getElementById('po-no').value;
    const date = document.getElementById('issue-date').value;
    const shipTo = document.getElementById('ship-to').value;
    const signer = document.getElementById('signer').value;
    const total = items.reduce((s, it) => s + (+it.unitPrice || 0) * (+it.qty || 0), 0);

    const addrLines = shipTo.split('\n').map(l => `<span>${esc(l.trim())}</span>`).join('<br>');

    const rows = items.map(it => {
        const amt = (+it.unitPrice || 0) * (+it.qty || 0);
        return `<tr>
            <td style="text-align:center">${esc(it.category)}</td>
            <td>${esc(it.description)}</td>
            <td style="text-align:right">${it.unitPrice ? fmt(it.unitPrice) : ''}</td>
            <td style="text-align:center">${esc(it.qty)}</td>
            <td style="text-align:right">${it.unitPrice ? fmt(amt) : ''}</td>
        </tr>`;
    }).join('');

    const bankLines = BANKING.map(l => `<div class="banking-line">${esc(l)}</div>`).join('');

    document.getElementById('invoice-preview').innerHTML = `
        <div>
        <table style="width:100%;border-collapse:collapse;margin-bottom:8px"><tbody><tr>
            <td style="width:40%;vertical-align:top"></td>
            <td style="vertical-align:top;text-align:right;font-size:8.5px;line-height:1.6">
                <strong>Quanta Computer Inc.</strong><br>No.211, Wen Hwa 2nd Rd.,<br>Kuei Shan District,<br>Taoyuan City 33377, Taiwan<br><strong>Attn: ${esc(signer)}</strong>
            </td>
        </tr></tbody></table>

        <div class="inv-title">Commercial Invoice</div>

        <div style="font-size:10px;font-weight:bold;margin-bottom:10px;padding-bottom:8px;border-bottom:0.5px solid #ccc">Invoice No: ${esc(invNo)}</div>

        <table class="inv-addr-table"><tbody><tr>
            <td><strong>Purchase Order</strong><br>To: ${addrLines}</td>
            <td><strong>P/O No:</strong> ${esc(poNo)}<br><strong>Issue Date:</strong> ${esc(date)}<br><strong>Currency:</strong> USD</td>
        </tr></tbody></table>

        <table class="inv-table"><thead><tr>
            <th style="width:14%">Item</th>
            <th style="width:36%">Description</th>
            <th style="width:17%">Unit Price</th>
            <th style="width:10%">Q'ty</th>
            <th style="width:17%">Amount</th>
        </tr></thead><tbody>
            ${rows}
            <tr class="total-row">
                <td colspan="3" style="text-align:right;font-size:9.5px">Total</td>
                <td colspan="2" style="text-align:right;font-size:10px">USD ${fmt(total)}</td>
            </tr>
        </tbody></table>

        <div class="say-total">${amtWords(total)}</div>

        <div class="banking">
            <div class="banking-title">Quanta Banking Information:</div>
            ${bankLines}
        </div>

        <div class="sig-block">
            <div class="sig-inner">
                <div class="sig-company">Quanta Computer Inc.</div>
                <div class="sig-name">${esc(signer)}</div>
            </div>
        </div>
        </div>
    `;
}

const today = new Date();
document.getElementById('issue-date').value = `${today.getFullYear()}/${String(today.getMonth() + 1).padStart(2, '0')}/${String(today.getDate()).padStart(2, '0')}`;

items = [newItem()];
renderItemsList();
render();

async function parsePO() {
    const txt = document.getElementById('po-paste').value.trim();
    if (!txt) {
        alert('Paste PO text first');
        return;
    }
    const errEl = document.getElementById('parse-error');
    errEl.style.display = 'none';
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = 'Parsing...';
    btn.disabled = true;

    try {
        const resp = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'x-api-key': 'your-api-key-here' // User needs to replace this
            },
            body: JSON.stringify({
                model: 'claude-sonnet-4-6',
                max_tokens: 1000,
                system: 'Extract invoice data from this Purchase Order. Return ONLY valid JSON with NO markdown fences. Shape: {"poNo":"","items":[{"category":"","description":"","unitPrice":0,"qty":1}]}',
                messages: [{ role: 'user', content: txt }]
            })
        });
        const data = await resp.json();
        if (!data.content) throw new Error('No response from API');
        const raw = data.content.map(b => b.text || '').join('');
        const parsed = JSON.parse(raw);
        if (parsed.poNo) document.getElementById('po-no').value = parsed.poNo;
        if (parsed.items?.length) {
            items = parsed.items.map(it => ({ id: nextId++, category: it.category || '', description: it.description || '', unitPrice: String(it.unitPrice || ''), qty: it.qty || 1 }));
            renderItemsList();
        }
        document.getElementById('po-paste').value = '';
        render();
    } catch (e) {
        errEl.textContent = '❌ Parse failed: Check your API key or PO text format. For now, add items manually.';
        errEl.style.display = 'block';
        console.error(e);
    }
    btn.textContent = orig;
    btn.disabled = false;
}

// Quick setup
console.log('%cQuanta Invoice Generator loaded!', 'color: #3b82f6; font-size: 14px; font-weight: bold');
console.log('To use AI parsing:');
console.log('1. Get API key from https://console.anthropic.com');
console.log('2. Find line "x-api-key": "your-api-key-here" in the code');
console.log('3. Replace with your actual API key');
console.log('Or just add items manually with the + Add button');
</script>

</body>
</html>
